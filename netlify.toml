# Next.js 16: Netlify nutzt den OpenNext/Next-Adapter (Build-Erkennung).
# Kein publish = "out" — kein reiner Static Export.
#
# Smart Secret Scanning: NEXT_PUBLIC_* wird ins Client-Bundle inlined; der Scanner erkennt
# oft Google-Keys (AIza…). Dann in Netlify unter Environment variables anlegen:
# SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = <dein Key, bei mehreren kommagetrennt>
# https://docs.netlify.com/manage/security/secret-scanning/#manage-false-positives
[build]
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "20"
