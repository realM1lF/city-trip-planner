# Next.js 16: Netlify nutzt den OpenNext/Next-Adapter (Build-Erkennung).
# Kein publish = "out" — kein reiner Static Export.
#
# Google Maps: GOOGLE_MAPS_API_KEY nur als Environment variable (serverseitig).
# Auth + DB: DATABASE_URL (Neon pooled), AUTH_SECRET, AUTH_URL, AUTH_GOOGLE_ID, AUTH_GOOGLE_SECRET.
# Kein NEXT_PUBLIC_GOOGLE_MAPS_API_KEY nötig — vermeidet Key-Literale im Client-Bundle / Secret-Scan.
[build]
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "20"
